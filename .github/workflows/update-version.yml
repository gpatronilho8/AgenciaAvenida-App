name: Bump System Version

# Este script corre sempre que fazes um push para a branch main
on:
  push:
    branches:
      - main 

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar o código
        uses: actions/checkout@v4

      - name: Analisar Commit e Atualizar Supabase
        run: |
          # 1. Obter a mensagem do último commit
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Mensagem do commit: $COMMIT_MSG"

          # 2. Ir ao Supabase ler a versão atual do sistema
          RESPONSE=$(curl -s -X GET "${{ secrets.SUPA_URL }}/rest/v1/versoes?id=eq.511ffa08-c5f2-44fd-9172-5618ccff68a4&select=versao" \
            -H "apikey: ${{ secrets.SUPA_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPA_SERVICE_KEY }}")
          
          CURRENT_VERSION=$(echo $RESPONSE | jq -r '.[0].versao')
          
          if [ "$CURRENT_VERSION" == "null" ] || [ -z "$CURRENT_VERSION" ]; then
            CURRENT_VERSION="1.0.0"
          fi
          
          echo "Versão atual: $CURRENT_VERSION"

          # 3. Separar a versão em Major, Minor e Patch (ex: 1 . 0 . 0)
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"

          # 4. Aplicar as tuas regras lógicas com base no prefixo do commit
          if [[ "$COMMIT_MSG" == Vers:* ]]; then
            major=$((major + 1))
            minor=0
            patch=0
          elif [[ "$COMMIT_MSG" == Feat:* ]]; then
            minor=$((minor + 1))
            patch=0
          elif [[ "$COMMIT_MSG" == Fix:* ]]; then
            patch=$((patch + 1))
          else
            echo "O commit não usa os prefixos definidos. A versão mantém-se."
            exit 0
          fi

          NEW_VERSION="$major.$minor.$patch"
          echo "A atualizar Supabase para a nova versão: $NEW_VERSION"

          # 5. Enviar a nova versão para o Supabase
          curl -s -X PATCH "${{ secrets.SUPA_URL }}/rest/v1/versoes?id=eq.511ffa08-c5f2-44fd-9172-5618ccff68a4" \
            -H "apikey: ${{ secrets.SUPA_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPA_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"versao\": \"$NEW_VERSION\"}"